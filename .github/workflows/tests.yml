name: Unit Tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: sleep 15

      - name: Run unit tests
        run: docker compose exec -T -e XDEBUG_MODE=coverage php-api sh -c "cd tests && /usr/local/bin/phpunit --testsuite 'Unit Tests' --coverage-clover=coverage/coverage.xml"

      - name: Copy coverage report from container
        run: docker compose cp php-api:/var/www/html/tests/coverage/coverage.xml ./coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
