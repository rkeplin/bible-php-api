apiVersion: apps/v1
kind: Deployment
metadata:
  name: bible-php-api
  namespace: bible
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bible-php-api
  template:
    metadata:
      labels:
        app: bible-php-api
    spec:
      containers:
        - name: api
          image: rkeplin/bible-php-api:latest
          ports:
            - containerPort: 80
          env:
            - name: SERVER_ADMIN
              value: rkeplin@gmail.com
            - name: APP_ENV
              value: production
            # CORS: allow both the production and k8s validation UI domains.
            # docker-entrypoint.sh turns this comma list into an origin
            # allow-list regex reflected back via .htaccess.
            - name: ALLOW_ORIGIN
              value: https://bible-ui.rkeplin.com,https://k8s-bible-ui.rkeplin.com
            - name: COOKIE_DOMAIN
              value: .rkeplin.com
            - name: REDIS_SERVER
              value: tcp://redis:6379
            - name: DB_HOST
              value: bible-db
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: bible-env
                  key: BIBLE_DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: bible-env
                  key: BIBLE_DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: bible-env
                  key: BIBLE_DB_PASS
            - name: MONGO_HOST
              value: mongo
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: bible-env
                  key: MONGO_DB
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: bible-env
                  key: MONGO_USER
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: bible-env
                  key: MONGO_PASS
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bible-php-api
  namespace: bible
spec:
  selector:
    app: bible-php-api
  ports:
    - name: http
      port: 80
      targetPort: 80
